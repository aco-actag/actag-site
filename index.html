<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ACTAG | Human State Transition Design</title>

  <meta name="description"
    content="ACTAGは、人と組織の状態遷移をデザインする実験的プロジェクトです。">

  <style>
    body {
      margin: 0;
      font-family: "Cormorant Garamond", "Yu Mincho", serif;
      color: #143226;
      background: #f8f8f3;
      letter-spacing: .06em;
    }

    header {
      position: absolute;
      top: 32px;
      left: 48px;
      right: 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .logo {
      font-size: 24px;
      letter-spacing: .35em;
    }

    nav {
      display: flex;
    }

    nav a {
      margin-left: 42px;
      font-size: 14px;
      text-decoration: none;
      color: inherit;
    }

    .menuButton {
      display: none;
      border: none;
      background: none;
      font-size: 30px;
      color: #143226;
      cursor: pointer;
    }

    .hero {
      position: relative;
      height: 92vh;
      background:
        linear-gradient(to bottom, rgba(255,255,255,.15), rgba(255,255,255,.4)),
        linear-gradient(120deg, #f7f7ef 0%, #eef3e8 35%, #6f8f5e 100%);
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: 0;
      bottom: 0;
      width: 70%;
      height: 72%;
      background:
        radial-gradient(circle at 80% 20%, rgba(255,255,255,.9), transparent 20%),
        linear-gradient(135deg, transparent 0%, rgba(48,92,65,.35) 100%);
      clip-path: polygon(10% 40%, 100% 0, 100% 100%, 0 100%);
      opacity: .9;
    }

    .heroText {
      position: absolute;
      left: 9%;
      top: 32%;
      z-index: 2;
    }

    h1 {
      font-size: clamp(34px, 4vw, 64px);
      font-weight: 400;
      line-height: 1.7;
      margin: 0 0 24px;
    }

    .heroText p {
      font-size: 18px;
    }

    section {
      padding: 110px 9%;
    }

    .about,
    .concept {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }

    .label {
      font-size: 14px;
      color: #6d7c70;
      margin-bottom: 28px;
    }

    h2 {
      font-size: 30px;
      font-weight: 400;
      margin-bottom: 32px;
    }

    p {
      line-height: 2.1;
      font-size: 16px;
    }

    .imageBox {
      height: 360px;
      background:
        radial-gradient(circle at 40% 30%, rgba(255,255,255,.9), transparent 18%),
        linear-gradient(135deg, #dfeadd, #4f7a4d);
    }

    .concept {
      background: #fbfbf6;
    }

    .diagram {
      width: 260px;
      height: 260px;
      margin: auto;
      border: 1px solid rgba(20,50,38,.25);
      border-radius: 50%;
      display: grid;
      place-items: center;
      letter-spacing: .35em;
      font-size: 26px;
    }

    .banner {
      padding: 64px 9%;
      background:
        linear-gradient(90deg, rgba(20,50,38,.75), rgba(20,50,38,.25)),
        #274b39;
      color: white;
      display: flex;
      justify-content: space-between;
      font-size: 22px;
    }

    footer {
      padding: 72px 9%;
      background: #143226;
      color: #f5f1e8;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 40px;
    }

    .footerLogo {
      text-align: center;
      letter-spacing: .35em;
      font-size: 24px;
    }

    @media (max-width: 800px) {

      .menuButton {
        display: block;
      }

      nav {
        display: none;
        position: absolute;
        top: 50px;
        right: 0;
        flex-direction: column;
        background: rgba(248,248,243,.97);
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,.1);
      }

      nav.open {
        display: flex;
      }

      nav a {
        margin: 10px 0;
        font-size: 18px;
      }

      .about,
      .concept,
      footer {
        grid-template-columns: 1fr;
      }

      .heroText {
        left: 7%;
        right: 7%;
      }

      h1 {
        font-size: 42px;
      }
    }
  </style>
</head>

<body>

  <section class="hero">

    <header>

      <div class="logo">ACTAG</div>

      <button class="menuButton" onclick="toggleMenu()">☰</button>

      <nav id="navMenu">
        <a href="#">About</a>
        <a href="#">Concept</a>
        <a href="#">Approach</a>
        <a href="#">Contact</a>
      </nav>

    </header>

    <div class="heroText">
      <h1>人の可能性が、<br>自然にひらく社会へ。</h1>
      <p>Human State Transition Design</p>
    </div>

  </section>

  <!-- 以下は今のまま -->

  <script>
    function toggleMenu() {
      document.getElementById("navMenu").classList.toggle("open");
    }
  </script>

</body>
</html>
